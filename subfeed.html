<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubFeed — 구독 피드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: #222;
  --accent: #e8ff47;
  --text: #f0f0f0;
  --muted: #666;
  --red: #ff4444;
}

body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 54px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.logo { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

.filter-bar { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex: 1; max-width: 460px; }
.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  white-space: nowrap; padding: 5px 13px; border-radius: 20px;
  font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace;
  cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all .15s;
}
.chip:hover { border-color: var(--text); color: var(--text); }
.chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

.hdr-right { display: flex; align-items: center; gap: 10px; }

.search-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 6px 12px; outline: none; width: 140px; transition: all .15s;
}
.search-input:focus { border-color: var(--accent); width: 200px; }
.search-input::placeholder { color: var(--muted); }

.btn {
  padding: 7px 15px; border-radius: 6px; font-size: 12px; font-weight: 700;
  font-family: 'Syne', sans-serif; cursor: pointer; border: none; transition: all .15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #d4eb00; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: #555; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* LOGIN */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 54px); padding: 40px 20px; }
.login-card {
  max-width: 420px; width: 100%;
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px;
}
.login-card h1 { font-size: 26px; font-weight: 800; line-height: 1.15; margin-bottom: 10px; }
.login-card h1 span { color: var(--accent); }
.login-card p { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 24px; }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.field input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 10px 13px; width: 100%; outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); }

.hint {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace;
  margin-bottom: 18px; line-height: 1.7;
}
.hint a { color: var(--accent); text-decoration: none; }
.hint strong { color: var(--text); }

.btn-full { width: 100%; margin-bottom: 8px; padding: 11px; font-size: 13px; }

/* STATS */
.stats {
  padding: 9px 20px; display: flex; gap: 18px; flex-wrap: wrap;
  border-bottom: 1px solid var(--border); background: var(--surface); align-items: center;
}
.stat { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.stat strong { color: var(--text); }

/* GRID */
.feed { padding: 18px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  overflow: hidden; cursor: pointer; transition: all .2s;
  display: flex; flex-direction: column; text-decoration: none; color: inherit;
}
.card:hover { border-color: #444; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.5); }

.thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.card:hover .thumb img { transform: scale(1.04); }

.duration {
  position: absolute; bottom: 6px; right: 6px;
  background: rgba(0,0,0,.85); color: #fff;
  font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 4px;
}
.new-badge {
  position: absolute; top: 8px; left: 8px;
  background: var(--accent); color: #000;
  font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 4px; letter-spacing: .5px;
}

.card-body { padding: 11px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.ch-row { display: flex; align-items: center; gap: 6px; }
.ch-avatar { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
.ch-name { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { margin-top: auto; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; display: flex; justify-content: space-between; padding-top: 4px; }

/* LOADING */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px 20px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress { font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; }

/* ERROR */
.error { background: rgba(255,68,68,.08); border: 1px solid rgba(255,68,68,.25); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; margin: 16px 20px; }

/* EMPTY STATE */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 20px; color: var(--muted); text-align: center; }
.empty-state .icon { font-size: 44px; }
.empty-state h2 { font-size: 16px; color: var(--text); }
.empty-state p { font-size: 12px; font-family: 'DM Mono', monospace; line-height: 1.7; max-width: 300px; }
.time-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }

.empty { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }

@media (max-width: 560px) {
  .filter-bar { display: none; }
  .search-input { width: 110px; }
  .search-input:focus { width: 140px; }
  .feed { padding: 12px; gap: 12px; grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header" id="header">
  <div class="logo"><div class="logo-dot"></div>SubFeed</div>
  <div class="filter-bar" id="filterBar" style="display:none">
    <button class="chip" onclick="setFilter(0)">오늘</button>
    <button class="chip" onclick="setFilter(1)">3일</button>
    <button class="chip active" onclick="setFilter(2)">1주일</button>
    <button class="chip" onclick="setFilter(3)">1달</button>
  </div>
  <div class="hdr-right" id="hdrRight">
    <!-- filled by JS -->
  </div>
</header>

<div id="app"></div>

<script>
const CLIENT_ID_KEY = 'subfeed_client_id';
const FILTERS = [
  { label: '오늘', hours: 24 },
  { label: '3일', hours: 72 },
  { label: '1주일', hours: 168 },
  { label: '1달', hours: 720 },
];

let state = {
  clientId: localStorage.getItem(CLIENT_ID_KEY) || '',
  token: '',
  filterIdx: 2,
  search: '',
  videos: [],
  loading: false,
  progress: '',
  error: '',
  totalSubs: 0,
  fetchedAt: null,
};

// ── OAuth token from URL hash ──────────────────────────────
function extractToken() {
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.slice(1));
    const t = p.get('access_token');
    if (t) {
      sessionStorage.setItem('subfeed_token', t);
      state.token = t;
      history.replaceState({}, '', window.location.pathname);
      return true;
    }
  }
  const saved = sessionStorage.getItem('subfeed_token');
  if (saved) { state.token = saved; return true; }
  return false;
}

function login() {
  const redirect = window.location.origin + window.location.pathname;
  const scope = 'https://www.googleapis.com/auth/youtube.readonly';
  const url = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${encodeURIComponent(state.clientId)}`
    + `&redirect_uri=${encodeURIComponent(redirect)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent(scope)}`;
  window.location.href = url;
}

function logout() {
  sessionStorage.removeItem('subfeed_token');
  state.token = '';
  state.videos = [];
  state.fetchedAt = null;
  state.error = '';
  render();
}

function saveClientId() {
  const id = document.getElementById('clientIdInput').value.trim();
  if (!id) return;
  localStorage.setItem(CLIENT_ID_KEY, id);
  state.clientId = id;
  render();
}

function clearClientId() {
  localStorage.removeItem(CLIENT_ID_KEY);
  state.clientId = '';
  render();
}

// ── API helpers ────────────────────────────────────────────
async function apiFetch(url) {
  const res = await fetch(url, { headers: { Authorization: `Bearer ${state.token}` } });
  if (res.status === 401) { logout(); throw new Error('세션 만료'); }
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function fetchAllSubs(onProgress) {
  let subs = [], page = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50${page ? '&pageToken=' + page : ''}`;
    const data = await apiFetch(url);
    subs = subs.concat(data.items || []);
    page = data.nextPageToken || '';
    onProgress(`구독 채널 로딩 중... ${subs.length}개`);
  } while (page);
  return subs;
}

async function fetchChannelVideos(channelId, publishedAfter, channelThumb) {
  try {
    const ch = await apiFetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}`);
    const playlist = ch.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;
    if (!playlist) return [];

    const pl = await apiFetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlist}&maxResults=10`);
    const items = (pl.items || []).filter(i => i.snippet?.publishedAt && new Date(i.snippet.publishedAt) >= new Date(publishedAfter));
    if (!items.length) return [];

    const ids = items.map(i => i.snippet.resourceId.videoId).join(',');
    const vd = await apiFetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}`);
    const dm = {};
    (vd.items || []).forEach(v => { dm[v.id] = v; });

    return items.map(i => {
      const vid = i.snippet.resourceId.videoId;
      const d = dm[vid];
      return {
        id: vid,
        title: i.snippet.title,
        channelTitle: i.snippet.videoOwnerChannelTitle || i.snippet.channelTitle,
        channelThumb,
        publishedAt: i.snippet.publishedAt,
        thumbnail: i.snippet.thumbnails?.medium?.url || i.snippet.thumbnails?.default?.url || '',
        duration: d ? parseDuration(d.contentDetails?.duration) : '',
        viewCount: d?.statistics?.viewCount || null,
      };
    });
  } catch { return []; }
}

function parseDuration(iso) {
  if (!iso) return '';
  const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '';
  const h = +( m[1]||0), min = +(m[2]||0), s = +(m[3]||0);
  return h ? `${h}:${String(min).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${min}:${String(s).padStart(2,'0')}`;
}

function timeAgo(d) {
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  if (diff < 604800) return `${Math.floor(diff/86400)}일 전`;
  return new Date(d).toLocaleDateString('ko-KR');
}

function fmtViews(n) {
  if (!n) return '';
  const x = parseInt(n);
  if (x >= 10000) return `${Math.floor(x/10000)}만회`;
  if (x >= 1000) return `${(x/1000).toFixed(1)}천회`;
  return `${x}회`;
}

// ── Load feed ──────────────────────────────────────────────
async function loadFeed() {
  if (!state.token) return;
  state.loading = true; state.error = ''; state.videos = [];
  render();

  try {
    const after = new Date(Date.now() - FILTERS[state.filterIdx].hours * 3600000).toISOString();
    const subs = await fetchAllSubs(p => { state.progress = p; render(); });
    state.totalSubs = subs.length;

    const all = [];
    const BATCH = 5;
    for (let i = 0; i < subs.length; i += BATCH) {
      const batch = subs.slice(i, i + BATCH);
      state.progress = `영상 수집 중... ${Math.min(i+BATCH, subs.length)} / ${subs.length}`;
      render();
      const results = await Promise.all(
        batch.map(s => fetchChannelVideos(s.snippet.resourceId.channelId, after, s.snippet.thumbnails?.default?.url))
      );
      results.forEach(r => all.push(...r));
    }

    all.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    state.videos = all;
    state.fetchedAt = new Date();
  } catch(e) {
    state.error = e.message || '알 수 없는 오류';
  }

  state.loading = false; state.progress = '';
  render();
}

// ── Filter ─────────────────────────────────────────────────
function setFilter(idx) {
  state.filterIdx = idx;
  document.querySelectorAll('.chip').forEach((c, i) => c.classList.toggle('active', i === idx));
}

// ── Render ─────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const filterBar = document.getElementById('filterBar');
  const hdrRight = document.getElementById('hdrRight');

  // Header controls
  if (state.token && !state.loading) {
    filterBar.style.display = 'flex';
    hdrRight.innerHTML = `
      <input class="search-input" placeholder="검색..." id="searchBox" value="${state.search}" oninput="state.search=this.value;renderCards()">
      <button class="btn btn-primary" onclick="loadFeed()" ${state.loading?'disabled':''}>새로고침</button>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    `;
  } else if (!state.token) {
    filterBar.style.display = 'none';
    hdrRight.innerHTML = '';
  }

  // Main content
  if (!state.token) {
    renderLogin(app);
  } else if (state.loading) {
    app.innerHTML = `<div class="loading"><div class="spinner"></div><div class="progress">${state.progress}</div><div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">채널이 많으면 시간이 걸려요...</div></div>`;
  } else if (!state.videos.length && !state.error) {
    renderEmpty(app);
  } else {
    renderFeed(app);
  }
}

function renderLogin(app) {
  if (!state.clientId) {
    app.innerHTML = `
      <div class="login-wrap"><div class="login-card">
        <h1>구독 채널<br><span>피드 대시보드</span></h1>
        <p>수백 개 구독 채널 중 최근 업로드만 한눈에 확인하세요.<br>Google OAuth Client ID가 필요해요.</p>
        <div class="hint">
          <strong>Google Cloud Console 설정:</strong><br>
          1. YouTube Data API v3 활성화<br>
          2. OAuth 동의화면 설정 (외부, 테스트사용자 추가)<br>
          3. OAuth 클라이언트 ID 생성 (웹 앱)<br>
          4. 승인된 JS 원본에 <strong>이 페이지 URL</strong> 추가<br>
          &nbsp;&nbsp;&nbsp;<code style="color:var(--accent)">${window.location.origin}</code>
        </div>
        <div class="field">
          <label>OAuth Client ID</label>
          <input id="clientIdInput" placeholder="123456789.apps.googleusercontent.com" onkeydown="if(event.key==='Enter')saveClientId()">
        </div>
        <button class="btn btn-primary btn-full" onclick="saveClientId()">저장하기</button>
      </div></div>`;
  } else {
    app.innerHTML = `
      <div class="login-wrap"><div class="login-card">
        <h1>구독 채널<br><span>피드 대시보드</span></h1>
        <p>Google 계정으로 로그인하면 구독 채널의 최신 영상을 불러와요.</p>
        <div class="hint"><strong>Client ID:</strong> ${state.clientId.slice(0,30)}...</div>
        ${state.error ? `<div class="error">⚠ ${state.error}</div>` : ''}
        <button class="btn btn-primary btn-full" onclick="login()">Google 계정으로 로그인</button>
        <button class="btn btn-ghost btn-full" onclick="clearClientId()">Client ID 변경</button>
      </div></div>`;
  }
}

function renderEmpty(app) {
  app.innerHTML = `
    <div class="empty-state">
      <div class="icon">📺</div>
      <h2>구독 피드 불러오기</h2>
      <p>기간을 선택하고 피드를 불러오세요.<br>채널이 많으면 시간이 걸릴 수 있어요.</p>
      <div class="time-chips">
        ${FILTERS.map((f,i)=>`<button class="chip ${i===state.filterIdx?'active':''}" onclick="setFilter(${i})">${f.label}</button>`).join('')}
      </div>
      ${state.error ? `<div class="error">⚠ ${state.error}</div>` : ''}
      <button class="btn btn-primary" style="margin-top:8px" onclick="loadFeed()">피드 불러오기</button>
    </div>`;
}

function renderFeed(app) {
  const filtered = state.videos.filter(v =>
    !state.search ||
    v.title.toLowerCase().includes(state.search.toLowerCase()) ||
    (v.channelTitle||'').toLowerCase().includes(state.search.toLowerCase())
  );

  const statsHtml = `
    <div class="stats">
      <div class="stat">영상 <strong>${filtered.length}개</strong>${state.search ? ` (전체 ${state.videos.length}개 중)`:''}</div>
      <div class="stat">채널 <strong>${state.totalSubs}개</strong></div>
      <div class="stat">기간 <strong>${FILTERS[state.filterIdx].label}</strong></div>
      ${state.fetchedAt ? `<div class="stat">업데이트 <strong>${state.fetchedAt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</strong></div>`:''}
    </div>`;

  const cardsHtml = filtered.length === 0
    ? `<div class="empty">검색 결과가 없어요 🔍</div>`
    : filtered.map(v => {
        const isNew = (Date.now() - new Date(v.publishedAt)) / 3600000 < 6;
        return `
          <a class="card" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noreferrer">
            <div class="thumb">
              ${v.thumbnail ? `<img src="${v.thumbnail}" alt="" loading="lazy">` : ''}
              ${v.duration ? `<div class="duration">${v.duration}</div>` : ''}
              ${isNew ? `<div class="new-badge">NEW</div>` : ''}
            </div>
            <div class="card-body">
              <div class="ch-row">
                ${v.channelThumb ? `<img class="ch-avatar" src="${v.channelThumb}" alt="">` : ''}
                <span class="ch-name">${v.channelTitle||''}</span>
              </div>
              <div class="card-title">${v.title}</div>
              <div class="card-meta">
                <span>${timeAgo(v.publishedAt)}</span>
                ${v.viewCount ? `<span>${fmtViews(v.viewCount)}</span>` : ''}
              </div>
            </div>
          </a>`;
      }).join('');

  app.innerHTML = `${statsHtml}<div class="feed">${cardsHtml}</div>`;

  // Restore search focus
  const sb = document.getElementById('searchBox');
  if (sb && state.search) sb.focus();
}

function renderCards() {
  // Re-render just feed portion without touching header
  const app = document.getElementById('app');
  if (state.videos.length) renderFeed(app);
}

// ── Init ───────────────────────────────────────────────────
extractToken();
render();
if (state.token && !state.videos.length) {
  // Auto-load if coming back from OAuth
  const fromOAuth = !window.location.hash && sessionStorage.getItem('subfeed_token');
  // just render ready state
}
</script>
</body>
</html>
