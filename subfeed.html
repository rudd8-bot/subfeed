<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubFeed — 구독 피드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a; --border: #222;
  --accent: #e8ff47; --text: #f0f0f0; --muted: #666; --red: #ff4444;
}
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 54px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.logo { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.btn { padding: 7px 13px; border-radius: 6px; font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; border: none; transition: all .15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #d4eb00; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: #555; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 11px; outline: none; width: 120px; transition: all .15s; }
.search-input:focus { border-color: var(--accent); width: 170px; }
.search-input::placeholder { color: var(--muted); }

.tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; overflow-x: auto; scrollbar-width: none; }
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab { padding: 10px 16px; font-size: 12px; font-weight: 700; font-family: 'DM Mono', monospace; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.time-bar { padding: 8px 16px; display: flex; gap: 6px; align-items: center; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.chip { white-space: nowrap; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .15s; }
.chip:hover { border-color: var(--text); color: var(--text); }
.chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

.stats { padding: 8px 16px; display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; }
.stat { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
.stat strong { color: var(--text); }

.feed { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.section-head { grid-column: 1/-1; display: flex; align-items: center; gap: 12px; padding: 8px 0 4px; }
.section-head h3 { font-size: 13px; font-weight: 700; color: var(--text); }
.section-head span { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
.section-divider { flex: 1; height: 1px; background: var(--border); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
.card:hover { border-color: #444; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.5); }
.thumb { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--surface2); }
.thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
.card:hover .thumb img { transform: scale(1.04); }
.duration { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,.85); color: #fff; font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 4px; }
.new-badge { position: absolute; top: 8px; left: 8px; background: var(--accent); color: #000; font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 4px; }
.card-body { padding: 11px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.ch-row { display: flex; align-items: center; gap: 6px; }
.ch-avatar { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
.ch-name { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { margin-top: auto; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; display: flex; justify-content: space-between; padding-top: 4px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px 20px; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress { font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; }
.error { background: rgba(255,68,68,.08); border: 1px solid rgba(255,68,68,.25); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--red); font-family: 'DM Mono', monospace; margin: 16px; }

.login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 54px); padding: 40px 20px; }
.login-card { max-width: 420px; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; }
.login-card h1 { font-size: 26px; font-weight: 800; line-height: 1.15; margin-bottom: 10px; }
.login-card h1 span { color: var(--accent); }
.login-card p { color: var(--muted); font-size: 13px; line-height: 1.7; margin-bottom: 24px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 13px; width: 100%; outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--accent); }
.hint { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 18px; line-height: 1.7; }
.hint strong { color: var(--text); }
.btn-full { width: 100%; margin-bottom: 8px; padding: 11px; font-size: 13px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 20px; color: var(--muted); text-align: center; }
.empty-state .icon { font-size: 44px; }
.empty-state h2 { font-size: 16px; color: var(--text); }
.empty-state p { font-size: 12px; font-family: 'DM Mono', monospace; line-height: 1.7; max-width: 300px; }
.empty { grid-column: 1/-1; text-align: center; padding: 50px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.75); backdrop-filter: blur(4px); display: flex; align-items: flex-start; justify-content: center; padding: 20px 16px; overflow-y: auto; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 540px; padding: 24px; }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.modal-head h2 { font-size: 16px; font-weight: 800; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-close:hover { color: var(--text); }
.cat-new-row { display: flex; gap: 8px; margin-bottom: 14px; }
.cat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 12px; outline: none; }
.cat-input:focus { border-color: var(--accent); }
.cat-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; min-height: 28px; }
.cat-tag { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
.cat-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; padding: 0; }
.cat-del:hover { color: var(--red); }
.modal-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 12px; outline: none; margin-bottom: 10px; }
.modal-search:focus { border-color: var(--accent); }
.modal-search::placeholder { color: var(--muted); }
.ch-list { display: flex; flex-direction: column; gap: 6px; max-height: 45vh; overflow-y: auto; }
.ch-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); }
.ch-item-av { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; background: var(--border); flex-shrink: 0; }
.ch-item-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ch-item-sel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 8px; outline: none; cursor: pointer; max-width: 130px; }

@media (max-width: 560px) {
  .search-input { width: 90px; }
  .search-input:focus { width: 130px; }
  .feed { padding: 12px; gap: 12px; grid-template-columns: 1fr 1fr; }
  .btn { padding: 6px 9px; font-size: 11px; }
}
@media (max-width: 380px) { .feed { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="header" id="header">
  <div class="logo"><div class="logo-dot"></div>SubFeed</div>
  <div class="hdr-right" id="hdrRight"></div>
</header>
<div id="tabsBar" style="display:none"></div>
<div id="timeBar" style="display:none"><div class="time-bar">
  <button class="chip" onclick="setFilter(0)">오늘</button>
  <button class="chip" onclick="setFilter(1)">3일</button>
  <button class="chip active" onclick="setFilter(2)">1주일</button>
  <button class="chip" onclick="setFilter(3)">1달</button>
</div></div>
<div id="app"></div>
<div id="modal"></div>

<script>
const CID_KEY = 'subfeed_client_id';
const CATS_KEY = 'subfeed_cats';
const MAP_KEY  = 'subfeed_cat_map';

const FILTERS = [{label:'오늘',hours:24},{label:'3일',hours:72},{label:'1주일',hours:168},{label:'1달',hours:720}];

let S = {
  clientId: localStorage.getItem(CID_KEY)||'',
  token: '',
  filterIdx: 2,
  search: '',
  activeTab: '전체',
  videos: [],
  subs: [],
  loading: false,
  progress: '',
  error: '',
  totalSubs: 0,
  fetchedAt: null,
  cats: JSON.parse(localStorage.getItem(CATS_KEY)||'[]'),
  catMap: JSON.parse(localStorage.getItem(MAP_KEY)||'{}'),
};

let modalSearch = '';

// ── OAuth ─────────────────────────────────────────────────
(function extractToken() {
  const h = window.location.hash;
  if (h.includes('access_token')) {
    const p = new URLSearchParams(h.slice(1)), t = p.get('access_token');
    if (t) { sessionStorage.setItem('sf_tok', t); S.token = t; history.replaceState({},'',' '); return; }
  }
  const s = sessionStorage.getItem('sf_tok');
  if (s) S.token = s;
})();

function login() {
  const r = window.location.origin + window.location.pathname;
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${encodeURIComponent(S.clientId)}&redirect_uri=${encodeURIComponent(r)}&response_type=token&scope=${encodeURIComponent('https://www.googleapis.com/auth/youtube.readonly')}`;
}
function logout() {
  sessionStorage.removeItem('sf_tok');
  Object.assign(S,{token:'',videos:[],subs:[],fetchedAt:null,error:'',activeTab:'전체'});
  render();
}
function saveClientId() {
  const v = document.getElementById('ciInput').value.trim();
  if (!v) return;
  localStorage.setItem(CID_KEY, v); S.clientId = v; render();
}

// ── API ───────────────────────────────────────────────────
async function api(url) {
  const r = await fetch(url,{headers:{Authorization:`Bearer ${S.token}`}});
  if (r.status===401){logout();throw new Error('세션 만료');}
  if (!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.json();
}

async function fetchAllSubs(onP) {
  let subs=[], page='';
  do {
    const d = await api(`https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50${page?'&pageToken='+page:''}`);
    subs=subs.concat(d.items||[]); page=d.nextPageToken||''; onP(`구독 채널 로딩 중... ${subs.length}개`);
  } while(page);
  return subs;
}

async function fetchChanVids(channelId, after, thumb) {
  try {
    const ch = await api(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}`);
    const pl = ch.items?.[0]?.contentDetails?.relatedPlaylists?.uploads;
    if (!pl) return [];
    const pd = await api(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${pl}&maxResults=10`);
    const items = (pd.items||[]).filter(i=>i.snippet?.publishedAt&&new Date(i.snippet.publishedAt)>=new Date(after));
    if (!items.length) return [];
    const ids = items.map(i=>i.snippet.resourceId.videoId).join(',');
    const vd = await api(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails,statistics&id=${ids}`);
    const dm={}; (vd.items||[]).forEach(v=>{dm[v.id]=v;});
    return items.map(i=>{
      const vid=i.snippet.resourceId.videoId, d=dm[vid];
      return {
        id:vid, title:i.snippet.title,
        channelTitle:i.snippet.videoOwnerChannelTitle||i.snippet.channelTitle,
        channelId:i.snippet.videoOwnerChannelId||i.snippet.channelId,
        channelThumb:thumb, publishedAt:i.snippet.publishedAt,
        thumbnail:i.snippet.thumbnails?.medium?.url||i.snippet.thumbnails?.default?.url||'',
        duration:d?parseDur(d.contentDetails?.duration):'',
        viewCount:d?.statistics?.viewCount||null,
      };
    });
  } catch{return[];}
}

function parseDur(iso){
  if(!iso)return'';
  const m=iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if(!m)return'';
  const h=+(m[1]||0),mn=+(m[2]||0),s=+(m[3]||0);
  return h?`${h}:${String(mn).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${mn}:${String(s).padStart(2,'0')}`;
}
function ago(d){
  const x=(Date.now()-new Date(d))/1000;
  if(x<3600)return`${Math.floor(x/60)}분 전`;
  if(x<86400)return`${Math.floor(x/3600)}시간 전`;
  if(x<604800)return`${Math.floor(x/86400)}일 전`;
  return new Date(d).toLocaleDateString('ko-KR');
}
function fv(n){
  if(!n)return'';const x=parseInt(n);
  if(x>=10000)return`${Math.floor(x/10000)}만회`;
  if(x>=1000)return`${(x/1000).toFixed(1)}천회`;
  return`${x}회`;
}

// ── Load ──────────────────────────────────────────────────
async function loadFeed(){
  if(!S.token)return;
  S.loading=true;S.error='';S.videos=[];render();
  try{
    const after=new Date(Date.now()-FILTERS[S.filterIdx].hours*3600000).toISOString();
    const subs=await fetchAllSubs(p=>{S.progress=p;document.getElementById('app').innerHTML=loadHtml(p);});
    S.totalSubs=subs.length;
    S.subs=subs.map(s=>({channelId:s.snippet.resourceId.channelId,title:s.snippet.title,thumb:s.snippet.thumbnails?.default?.url||''}));
    const all=[];
    for(let i=0;i<subs.length;i+=5){
      const batch=subs.slice(i,i+5);
      S.progress=`영상 수집 중... ${Math.min(i+5,subs.length)} / ${subs.length}`;
      document.getElementById('app').innerHTML=loadHtml(S.progress);
      const res=await Promise.all(batch.map(s=>fetchChanVids(s.snippet.resourceId.channelId,after,s.snippet.thumbnails?.default?.url)));
      res.forEach(r=>all.push(...r));
    }
    all.sort((a,b)=>new Date(b.publishedAt)-new Date(a.publishedAt));
    S.videos=all;S.fetchedAt=new Date();
  }catch(e){S.error=e.message||'오류';}
  S.loading=false;S.progress='';render();
}
function loadHtml(p){return`<div class="loading"><div class="spinner"></div><div class="progress">${p}</div><div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">채널이 많으면 시간이 걸려요...</div></div>`;}

// ── Category ──────────────────────────────────────────────
function saveCats(){localStorage.setItem(CATS_KEY,JSON.stringify(S.cats));localStorage.setItem(MAP_KEY,JSON.stringify(S.catMap));}
function getCat(cid){return S.catMap[cid]||'미분류';}
function allTabs(){
  const used=new Set(Object.values(S.catMap));
  const hasMiscl=S.subs.some(s=>!S.catMap[s.channelId]);
  return['전체',...S.cats.filter(c=>used.has(c)),...(hasMiscl?['미분류']:[])];
}

// ── Filter ────────────────────────────────────────────────
function setFilter(idx){
  S.filterIdx=idx;
  document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',i===idx));
}
function setTab(t){S.activeTab=t;render();}

// ── Render ────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const tabs=document.getElementById('tabsBar');
  const time=document.getElementById('timeBar');
  const hdr=document.getElementById('hdrRight');

  if(S.token&&!S.loading){
    hdr.innerHTML=`
      <input class="search-input" placeholder="검색..." id="sb" value="${S.search}" oninput="S.search=this.value;renderFeed()">
      <button class="btn btn-ghost btn-sm" onclick="openModal()">카테고리</button>
      <button class="btn btn-primary btn-sm" onclick="loadFeed()">새로고침</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">로그아웃</button>`;
    tabs.style.display='block';
    time.style.display='block';
    const ts=allTabs();
    tabs.innerHTML=`<div class="tabs-wrap">${ts.map(t=>`<button class="tab ${S.activeTab===t?'active':''}" onclick="setTab('${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')}</div>`;
    // sync chip active
    document.querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('active',i===S.filterIdx));
  } else if(!S.token){
    hdr.innerHTML='';tabs.style.display='none';time.style.display='none';
  }

  if(!S.token){renderLogin(app);return;}
  if(S.loading){app.innerHTML=loadHtml(S.progress);return;}
  if(!S.videos.length&&!S.error){renderEmpty(app);return;}
  renderFeed();
}

function renderFeed(){
  const app=document.getElementById('app');
  if(!app)return;
  const q=S.search.toLowerCase();
  let vids=S.videos.filter(v=>!q||v.title.toLowerCase().includes(q)||(v.channelTitle||'').toLowerCase().includes(q));
  if(S.activeTab!=='전체') vids=vids.filter(v=>getCat(v.channelId)===S.activeTab);

  const stats=`<div class="stats">
    <div class="stat">영상 <strong>${vids.length}개</strong></div>
    <div class="stat">채널 <strong>${S.totalSubs}개</strong></div>
    <div class="stat">기간 <strong>${FILTERS[S.filterIdx].label}</strong></div>
    ${S.fetchedAt?`<div class="stat">업데이트 <strong>${S.fetchedAt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</strong></div>`:''}
  </div>`;

  if(S.error){app.innerHTML=stats+`<div class="error">⚠ ${S.error}</div>`;return;}
  if(!vids.length){app.innerHTML=stats+`<div class="feed"><div class="empty">영상이 없어요 🎬</div></div>`;return;}

  let body='';
  if(S.activeTab==='전체'){
    // group by category
    const grp={};
    vids.forEach(v=>{const c=getCat(v.channelId);if(!grp[c])grp[c]=[];grp[c].push(v);});
    const ord=[...S.cats.filter(c=>grp[c]),...(grp['미분류']?['미분류']:[])];
    body=`<div class="feed">`;
    ord.forEach(cat=>{
      body+=`<div class="section-head"><h3>${cat}</h3><span>${grp[cat].length}개</span><div class="section-divider"></div></div>`;
      body+=grp[cat].map(cardHtml).join('');
    });
    body+=`</div>`;
  } else {
    body=`<div class="feed">${vids.map(cardHtml).join('')}</div>`;
  }
  app.innerHTML=stats+body;
}

function cardHtml(v){
  const isNew=(Date.now()-new Date(v.publishedAt))/3600000<6;
  return`<a class="card" href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noreferrer">
    <div class="thumb">
      ${v.thumbnail?`<img src="${v.thumbnail}" alt="" loading="lazy">`:''}
      ${v.duration?`<div class="duration">${v.duration}</div>`:''}
      ${isNew?`<div class="new-badge">NEW</div>`:''}
    </div>
    <div class="card-body">
      <div class="ch-row">
        ${v.channelThumb?`<img class="ch-avatar" src="${v.channelThumb}" alt="">`:''}
        <span class="ch-name">${v.channelTitle||''}</span>
      </div>
      <div class="card-title">${v.title}</div>
      <div class="card-meta"><span>${ago(v.publishedAt)}</span>${v.viewCount?`<span>${fv(v.viewCount)}</span>`:''}</div>
    </div>
  </a>`;
}

function renderLogin(app){
  if(!S.clientId){
    app.innerHTML=`<div class="login-wrap"><div class="login-card">
      <h1>구독 채널<br><span>피드 대시보드</span></h1>
      <p>수백 개 구독 채널 중 최근 업로드만 한눈에 확인하세요.</p>
      <div class="hint"><strong>Google Cloud Console 설정:</strong><br>
        1. YouTube Data API v3 활성화<br>2. OAuth 동의화면 → 외부 → 테스트사용자 추가<br>
        3. OAuth 클라이언트 ID 생성 (웹 앱)<br>4. 승인된 JS 원본 + 리디렉션 URI에:<br>
        <code style="color:var(--accent)">${window.location.origin+window.location.pathname}</code>
      </div>
      <div class="field"><label>OAuth Client ID</label>
        <input id="ciInput" placeholder="123456789.apps.googleusercontent.com" onkeydown="if(event.key==='Enter')saveClientId()">
      </div>
      <button class="btn btn-primary btn-full" onclick="saveClientId()">저장하기</button>
    </div></div>`;
  } else {
    app.innerHTML=`<div class="login-wrap"><div class="login-card">
      <h1>구독 채널<br><span>피드 대시보드</span></h1>
      <p>Google 계정으로 로그인하면 구독 채널의 최신 영상을 불러와요.</p>
      <div class="hint"><strong>Client ID:</strong> ${S.clientId.slice(0,30)}...</div>
      ${S.error?`<div class="error">⚠ ${S.error}</div>`:''}
      <button class="btn btn-primary btn-full" onclick="login()">Google 계정으로 로그인</button>
      <button class="btn btn-ghost btn-full" onclick="localStorage.removeItem('${CID_KEY}');S.clientId='';render()">Client ID 변경</button>
    </div></div>`;
  }
}

function renderEmpty(app){
  app.innerHTML=`<div class="empty-state">
    <div class="icon">📺</div><h2>구독 피드 불러오기</h2>
    <p>기간을 선택하고 피드를 불러오세요.</p>
    ${S.error?`<div class="error">⚠ ${S.error}</div>`:''}
    <button class="btn btn-primary" style="margin-top:8px" onclick="loadFeed()">피드 불러오기</button>
  </div>`;
}

// ── Modal ─────────────────────────────────────────────────
function openModal(){ modalSearch=''; renderModal(); }
function closeModal(){ document.getElementById('modal').innerHTML=''; }

function renderModal(){
  document.getElementById('modal').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head"><h2>카테고리 관리</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px">새 카테고리</div>
        <div class="cat-new-row">
          <input class="cat-input" id="catIn" placeholder="카테고리 이름..." onkeydown="if(event.key==='Enter')addCat()">
          <button class="btn btn-primary btn-sm" onclick="addCat()">추가</button>
        </div>
        <div class="cat-list">
          ${S.cats.map(c=>`<div class="cat-tag">${c}<button class="cat-del" onclick="delCat('${c.replace(/'/g,"\\'")}')">✕</button></div>`).join('')}
          ${!S.cats.length?`<span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">카테고리가 없어요</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px">채널별 카테고리 지정 (${S.subs.length}개)</div>
        <input class="modal-search" placeholder="채널 검색..." value="${modalSearch}" oninput="modalSearch=this.value;renderChList()" id="modalSrch">
        <div class="ch-list" id="chList">${chListHtml(modalSearch)}</div>
        <div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="exportCats()" title="설정 내보내기">📤 내보내기</button>
            <label class="btn btn-ghost btn-sm" style="cursor:pointer;margin:0" title="설정 가져오기">📥 가져오기<input type="file" accept=".json" style="display:none" onchange="importCats(this)"></label>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-ghost btn-sm" onclick="closeModal()">닫기</button>
            <button class="btn btn-primary btn-sm" onclick="closeModal();render()">완료</button>
          </div>
        </div>
      </div>
    </div>`;
}

function chListHtml(q){
  const filt=S.subs.filter(s=>!q||s.title.toLowerCase().includes(q.toLowerCase()));
  if(!filt.length) return '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;font-family:"DM Mono",monospace">검색 결과 없음</div>';
  return filt.map(s=>{
    const cur=S.catMap[s.channelId]||"";
    return `<div class="ch-item">
      ${s.thumb?'<img class="ch-item-av" src="'+s.thumb+'" alt="">':'<div class="ch-item-av"></div>'}
      <span class="ch-item-name">${s.title}</span>
      <select class="ch-item-sel" onchange="setChCat('${s.channelId}',this.value)">
        <option value="">미분류</option>
        ${S.cats.map(c=>'<option value="'+c+'"'+(cur===c?' selected':'')+'>'+c+'</option>').join('')}
      </select>
    </div>`;
  }).join('');
}
function renderChList(){
  const el=document.getElementById('chList');
  if(el) el.innerHTML=chListHtml(modalSearch);
}
function addCat(){
  const v=document.getElementById('catIn').value.trim();
  if(!v||S.cats.includes(v))return;
  S.cats.push(v);saveCats();renderModal();
}
function delCat(name){
  S.cats=S.cats.filter(c=>c!==name);
  Object.keys(S.catMap).forEach(k=>{if(S.catMap[k]===name)delete S.catMap[k];});
  saveCats();renderModal();
}
function setChCat(cid,cat){
  if(cat)S.catMap[cid]=cat; else delete S.catMap[cid];
  saveCats();
}

function exportCats(){
  const data = JSON.stringify({cats: S.cats, catMap: S.catMap}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'subfeed-categories.json';
  a.click();
}

function importCats(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.cats && data.catMap){
        S.cats = data.cats;
        S.catMap = data.catMap;
        saveCats();
        renderModal();
        alert('가져오기 완료!');
      } else {
        alert('올바른 파일이 아니에요.');
      }
    } catch {
      alert('파일을 읽을 수 없어요.');
    }
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
